<!doctype html>
<html>
  <head>
<link rel="stylesheet" href={{ url_for('static', filename='css/styles.css') }}>
  </head>
  <body>
    <script src="/static/js/socket.io.min.js"></script>
    <script type="text/javascript" src={{ url_for('static', filename='js/coms.js') }}> </script>
    <div id="SongOrderCont" class="container">
      <div id="SONavButtons" class="TopMenu">
        <button id="SOPrev" type="button" onclick="send('command','Prev')"> ◀ <div class="PrevNote note"></div> </button>
        <button id="SOEmpty" type="button" onclick="send('command','Empty')"> Elrejt <div class="ActNote note"> </div> </button>
        <button id="SOplayPause" type="button" onclick="send('command','PlayPause')"> <div class="MediaNameNote note"> </div> ▶/▐▐ <div class="MediaDataNote note"> </div></button>
        <button id="SOSkip" type="button" onclick="send('command','Skip')"> ▶▶| </button>
        <button id="SONext" type="button" onclick="send('command','Next')"> ▶ <div class="NextNote note"> </button>
      </div>
      <input type="search" id="SongOrderFilter" placeholder=" " class="search">
      <div class="scrollable" id="SongOrderScroll">
      </div>
    </div>
    <div id="SongCont" class="container">
      <div id="NavButtons" class="TopMenu">
        <button id="Prev" type="button" onclick="send('command','Prev')"> ◀ <div class="PrevNote note"></div> </button>
        <button id="Empty" type="button" onclick="send('command','Empty')">Elrejt <div class="ActNote note"> </div> </button>
        <button id="Skip" type="button" onclick="send('command','Skip')"> ▶▶| </button>
        <button id="Next" type="button" onclick="send('command','Next')"> ▶ <div class="NextNote note"> </button>
      </div>
      <input type="search" id="SongFilter" placeholder=" " class="search">
      <div class="scrollable" id="SongScroll">
      </div>
    </div>
    <div id="TalkCont" class="container">
      <div id="TalkNavButtons" class="TopMenu">
        <button id="Music" type="button" onclick="send('command','Music')">
          <div class="MediaNameNote note"> </div> Zene <div class="MediaDataNote note">
        </button>
        <button id="Thanks" type="button" onclick="send('command','Thanks')">
          Köszönjük
        </button>
      </div>
      <input type="search" id="TalkFilter" placeholder=" " class="search">
      <div class="scrollable" id="TalkScroll">
      </div>
    </div>
    <div id="MusicCont" class="container">
      <div id="MusicControll">
        <div class="VHalf">
        <button onclick="send('soundSet','Play')" id="PlayBtn">▶ </button>
        <button onclick="send('soundSet','Pause')" id="PauseBtn">▐▐ </button>
        <button onclick="send('soundSet','Stop')" id="StopBtn"> ■ </button>
        </div>
        <div class="VHalf">
        <label id="autoplayLabel" for="autoplay" > Autoplay::
        <input type="checkbox" id="autoplay" onchange="send('soundSet','Auto:'+this.checked)" />
</label>
        <div id="MusicStatus">  </div>
        <label id="volumeLabel" for="volume" > 🔊
</label>
        <input type="range" id="volume" name="volume" min="0" max="100" onchange="send('soundSet','Volume:'+this.value)" />
        </div>
      </div>
      <input type="search" id="MusicFilter" placeholder=" " class="search">
      <div class="scrollable" id="MusicScroll">
      </div>
    </div>
    <div id="SettingsCont" class="container">
      <button id="invert" onclick="send('command','Invert')"> Invertálás </button>
      <div id="SubModeSelector">
        <button id="TemplateMode" type="button" onclick="selectSubMode('Template')">Sablon</button>
        <button id="MarginMode" type="button" onclick="selectSubMode('marginSetter')">Margó</button>
      </div>
      <div id="marginSetter" class="SubMode">
        <button id="marginL+" class="marginV" onclick="send('margin','L-')"> ↤</button>
        <button id="marginL-" class="marginV" onclick="send('margin','L+')"> ⇥</button>
        <div>
        <button id="marginU+" class="marginH" onclick="send('margin','T-')"> ↥ </button>
        <button id="marginU-" class="marginH" onclick="send('margin','T+')"> ⤓ </button>
        <button id="marginReset" class="marginX" onclick="send('margin','Reset')"> X </button>
        <button id="marginD+" class="marginH" onclick="send('margin','B+')"> ⤒ </button>
        <button id="marginD-" class="marginH" onclick="send('margin','B-')"> ↧ </button>
        </div>
        <button id="marginR+" class="marginV" onclick="send('margin','R+')"> ⇤</button>
        <button id="marginR-" class="marginV" onclick="send('margin','R-')"> ↦</button>
      </div>
      <div id="Template" class="SubMode">
        <input type="search" id="TemplateFilter" placeholder=" " class="search">
        <div class="scrollable" id="TemplateScroll">
        </div>
      </div>

    </div>
    <div id="ModeSelector">
      <button id="SongOrderMode" type="button" onclick="selectMode('SongOrder')">
        Zenerend
      </button>
      <button id="SongMode" type="button" onclick="selectMode('Song')">
        Énekek
      </button>
      <button id="TalkMode" type="button" onclick="selectMode('Talk')">
        Bevezetők
      </button>
      <button id="MusicMode" type="button" onclick="selectMode('Music')">
        Zenék
      </button>
      <button id="SettingsMode" type="button" onclick="selectMode('Settings')">
        ⚙️
      </button>
    </div>
    <script>
      makeFilter("Song")
      makeFilter("SongOrder")
      makeFilter("Talk")
      makeFilter("Music")
      makeFilter("Template")
      selectMode("Song")
    </script>
  </body>
</html>
